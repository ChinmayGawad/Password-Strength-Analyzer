<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Password Strength Analyzer</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Poppins", sans-serif;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #1d2671, #c33764);
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .container {
      width: 100%;
      max-width: 420px;
      background: rgba(255, 255, 255, 0.12);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 20px;
      padding: 30px;
      color: white;
      box-shadow: 0 8px 32px rgba(0,0,0,0.25);
    }

    .title {
      text-align: center;
      margin-bottom: 25px;
    }

    .title h1 {
      font-size: 28px;
      font-weight: 600;
    }

    .title p {
      font-size: 14px;
      opacity: 0.8;
      margin-top: 5px;
    }

    .input-group {
      position: relative;
      margin-bottom: 20px;
    }

    input {
      width: 100%;
      padding: 14px 50px 14px 15px;
      border: none;
      outline: none;
      border-radius: 12px;
      font-size: 16px;
      background: rgba(255,255,255,0.15);
      color: white;
      transition: 0.3s;
    }

    input::placeholder {
      color: rgba(255,255,255,0.7);
    }

    input:focus {
      background: rgba(255,255,255,0.22);
      border: 1px solid rgba(255,255,255,0.3);
    }

    .toggle-btn {
      position: absolute;
      right: 15px;
      top: 50%;
      transform: translateY(-50%);
      cursor: pointer;
      color: white;
      font-size: 14px;
      user-select: none;
    }

    .strength-meter {
      width: 100%;
      height: 10px;
      background: rgba(255,255,255,0.15);
      border-radius: 10px;
      overflow: hidden;
      margin-top: 10px;
    }

    .strength-bar {
      height: 100%;
      width: 0%;
      border-radius: 10px;
      transition: 0.4s ease;
    }

    .result {
      margin-top: 20px;
    }

    .strength-text {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 12px;
    }

    .suggestions {
      background: rgba(255,255,255,0.08);
      border-radius: 12px;
      padding: 15px;
      margin-top: 15px;
    }

    .suggestions h3 {
      margin-bottom: 10px;
      font-size: 16px;
    }

    .suggestions ul {
      padding-left: 18px;
    }

    .suggestions li {
      margin-bottom: 6px;
      font-size: 14px;
      opacity: 0.9;
    }

    .tips {
      margin-top: 20px;
      font-size: 13px;
      opacity: 0.8;
      text-align: center;
      line-height: 1.5;
    }

    @media (max-width: 500px) {
      .container {
        padding: 22px;
      }

      .title h1 {
        font-size: 24px;
      }

      input {
        font-size: 14px;
      }
    }
  </style>
</head>
<body>

  <div class="container">

    <div class="title">
      <h1>Password Analyzer</h1>
      <p>Check your password security instantly</p>
    </div>

    <div class="input-group">
      <input type="password" id="password" placeholder="Enter your password" oninput="analyzePassword()">
      <span class="toggle-btn" onclick="togglePassword()">Show</span>
    </div>

    <div class="strength-meter">
      <div class="strength-bar" id="strengthBar"></div>
    </div>

    <div class="result">
      <div class="strength-text" id="strengthText">
        Password Strength: -
      </div>

      <div class="suggestions" id="suggestions">
        <h3>Suggestions</h3>
        <ul id="suggestionList">
          <li>Use at least 8 characters</li>
          <li>Include uppercase and lowercase letters</li>
          <li>Add numbers and special symbols</li>
        </ul>
      </div>
    </div>

    <div class="tips">
      Strong passwords protect your accounts from unauthorized access.
    </div>

  </div>

  <script>
    const passwordInput = document.getElementById("password");
    const strengthText = document.getElementById("strengthText");
    const strengthBar = document.getElementById("strengthBar");
    const suggestionList = document.getElementById("suggestionList");

    function analyzePassword() {
      const password = passwordInput.value;

      let score = 0;
      let suggestions = [];

      // Conditions
      if (password.length >= 8) {
        score++;
      } else {
        suggestions.push("Use at least 8 characters.");
      }

      if (/[A-Z]/.test(password)) {
        score++;
      } else {
        suggestions.push("Add uppercase letters.");
      }

      if (/[a-z]/.test(password)) {
        score++;
      } else {
        suggestions.push("Add lowercase letters.");
      }

      if (/[0-9]/.test(password)) {
        score++;
      } else {
        suggestions.push("Include numbers.");
      }

      if (/[!@#$%^&*(),.?":{}|<>]/.test(password)) {
        score++;
      } else {
        suggestions.push("Use special characters.");
      }

      // Strength Logic
      let strength = "";
      let width = "";
      let color = "";

      switch(score) {
        case 1:
        case 2:
          strength = "Weak";
          width = "30%";
          color = "#ff4d4d";
          break;

        case 3:
          strength = "Medium";
          width = "60%";
          color = "#ffaa00";
          break;

        case 4:
          strength = "Strong";
          width = "80%";
          color = "#4dd26b";
          break;

        case 5:
          strength = "Very Strong";
          width = "100%";
          color = "#00e676";
          break;

        default:
          strength = "-";
          width = "0%";
          color = "transparent";
      }

      // Update UI
      strengthText.innerHTML = `Password Strength: ${strength}`;
      strengthBar.style.width = width;
      strengthBar.style.background = color;

      // Suggestions
      suggestionList.innerHTML = "";

      if (password.length === 0) {
        suggestionList.innerHTML = `
          <li>Use at least 8 characters</li>
          <li>Include uppercase and lowercase letters</li>
          <li>Add numbers and special symbols</li>
        `;
        return;
      }

      if (suggestions.length === 0) {
        suggestionList.innerHTML = `
          <li>Your password is highly secure ✅</li>
        `;
      } else {
        suggestions.forEach(item => {
          const li = document.createElement("li");
          li.textContent = item;
          suggestionList.appendChild(li);
        });
      }
    }

    function togglePassword() {
      const toggleBtn = document.querySelector(".toggle-btn");

      if (passwordInput.type === "password") {
        passwordInput.type = "text";
        toggleBtn.textContent = "Hide";
      } else {
        passwordInput.type = "password";
        toggleBtn.textContent = "Show";
      }
    }
  </script>

</body>
</html>
